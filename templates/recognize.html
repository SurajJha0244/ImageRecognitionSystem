<!DOCTYPE html>
<html>

<head>
    <title>Face Recognition</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.2);
            width: 350px;
            text-align: center;
        }

        h2 {
            color: #2c3e50;
            margin-bottom: 25px;
        }

        input[type="file"] {
            margin: 15px 0;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            width: 100%;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            border: none;
            background: #3498db;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #217dbb;
        }

        .back {
            margin-top: 15px;
            display: block;
            text-decoration: none;
            color: #3498db;
            font-size: 14px;
        }

        .back:hover {
            text-decoration: underline;
        }

        .result-box {
            margin-top: 25px;
            padding: 15px;
            border-radius: 10px;
            background: #ecf9f1;
            border: 1px solid #27ae60;
            text-align: left;
        }

        .error-box {
            margin-top: 25px;
            padding: 15px;
            border-radius: 10px;
            background: #fdecea;
            border: 1px solid red;
            color: red;
        }
    </style>
</head>

<body>

    <div class="card">

        <h2>Recognize Face</h2>

        <form action="/recognize" method="POST" enctype="multipart/form-data">

            <input type="file" name="image" required>

            <button type="submit">Recognize</button>

        </form>
        {% if success %}
        <div class="result-box">
            <h3>✔ {{ success }}</h3>
            <p><b>Name:</b> {{ name }}</p>
        </div>
        {% endif %}

        {% if error %}
        <div class="error-box">
            ❌ {{ error }}
        </div>
        {% endif %}

        <a class="back" href="/">← Back to Home</a>

    </div>

</body>

</html>
