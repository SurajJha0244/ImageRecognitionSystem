<!DOCTYPE html>
<html>
<head>
    <title>Train Face Model</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
            width: 400px;
            text-align: center;
        }

        h2 {
            color: #2c3e50;
            margin-bottom: 25px;
        }

        input[type="file"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #27ae60;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #1e8449;
        }

        .result-box {
            margin-top: 25px;
            padding: 15px;
            border-radius: 10px;
            background: #ecf9f1;
            border: 1px solid #27ae60;
            text-align: left;
        }

        .error-box {
            margin-top: 25px;
            padding: 15px;
            border-radius: 10px;
            background: #fdecea;
            border: 1px solid red;
            color: red;
        }

        .back {
            margin-top: 15px;
            display: block;
            text-decoration: none;
            color: #3498db;
        }
        
        .input-box {
    width: 100%;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 15px;
    margin-bottom: 10px;
    box-sizing: border-box;
}

    </style>
</head>

<body>

<div class="card">

    <h2>Train Face Model</h2>

    <form action="/train" method="POST" enctype="multipart/form-data">

    <input 
        type="text"
        name="person_name"
        placeholder="Enter Person Name"
        required
        class="input-box"
    >

    <br><br>

    <input type="file" name="image" required>

    <button type="submit">Train Image</button>

</form>

   {% if success %}
<div class="result-box">
    ✔ {{ success }}
</div>
{% endif %}

{% if error %}
<div class="error-box">
      {{ error }}
</div>
{% endif %}
    <a class="back" href="/">← Back to Home</a>

</div>

</body>
</html>
